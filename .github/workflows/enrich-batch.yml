name: Enrich batch (daily)

on:
  schedule:
    - cron: "0 5 * * *"  # Daily 05:00 UTC ~ 07:00 Paris
  workflow_dispatch:
    inputs:
      people_limit:
        description: "Max entities for people enrichment"
        default: "50"
      sfcr_limit:
        description: "Max entities for SFCR analysis"
        default: "25"

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: DAF + CIO enrichment (LinkedIn via DDG)
        working-directory: scraper
        run: python enrichment/daf_cio_enricher.py --priority --delay 2.5

      - name: People enrichment - DG/President (LinkedIn via DDG)
        working-directory: scraper
        run: python enrichment/people_enricher.py --limit ${{ github.event.inputs.people_limit || 50 }}

      - name: SFCR enrichment (structured products + financials)
        working-directory: scraper
        run: python enrichment/sfcr_parser.py --limit ${{ github.event.inputs.sfcr_limit || 25 }}

      - name: Re-export Folk CSV
        working-directory: scraper
        run: python folk_export.py

      - name: Bump last_updated on enriched files
        # Daily enrichment mutates entities.json/stats.json (adds people,
        # financials, structured-product flags) but the per-script writers
        # don't refresh the last_updated field — only the weekly Refresh
        # directory job does. Without this step the dashboard shows a date
        # that's days stale even though fresh enrichment data is present.
        run: |
          python - <<'PY'
          import json, datetime, pathlib
          stamp = datetime.datetime.utcnow().isoformat(timespec="seconds") + "Z"
          for p in [pathlib.Path("docs/data/entities.json"),
                    pathlib.Path("docs/data/stats.json")]:
              if not p.exists():
                  continue
              data = json.loads(p.read_text(encoding="utf-8"))
              if isinstance(data, dict):
                  data["last_updated"] = stamp
                  p.write_text(json.dumps(data, ensure_ascii=False, indent=2), encoding="utf-8")
                  print(f"bumped {p}")
          PY

      - name: Commit & push (with retry on conflict)
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add docs/data/
          git diff --staged --quiet && echo "no changes, skipping" && exit 0
          git commit -m "Daily enrichment $(date -u +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main || git rebase --abort
            if git push origin main; then
              echo "push succeeded on attempt $i"
              exit 0
            fi
            echo "push rejected, attempt $i/5, retrying..."
            sleep 5
          done
          echo "ERROR: push failed after 5 attempts"
          exit 1
