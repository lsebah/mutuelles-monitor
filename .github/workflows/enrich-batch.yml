name: Enrich batch (daily)

on:
  schedule:
    - cron: "0 5 * * *"  # Daily 05:00 UTC ~ 07:00 Paris
  workflow_dispatch:
    inputs:
      people_limit:
        description: "Max entities for people enrichment"
        default: "50"
      sfcr_limit:
        description: "Max entities for SFCR analysis"
        default: "25"

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: People enrichment (LinkedIn via DDG)
        working-directory: scraper
        run: python enrichment/people_enricher.py --limit ${{ github.event.inputs.people_limit || 50 }}

      - name: SFCR enrichment (structured products + financials)
        working-directory: scraper
        run: python enrichment/sfcr_parser.py --limit ${{ github.event.inputs.sfcr_limit || 25 }}

      - name: Re-export Folk CSV
        working-directory: scraper
        run: python folk_export.py

      - name: Commit & push
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add docs/data/
          git diff --staged --quiet || git commit -m "Daily enrichment $(date -u +%Y-%m-%d)"
          git push
