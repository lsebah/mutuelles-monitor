name: Refresh directory (weekly)

on:
  schedule:
    - cron: "0 6 * * 1"  # Monday 06:00 UTC ~ 08:00 Paris
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper (refresh online sources)
        working-directory: scraper
        run: python main.py --refresh

      - name: Generate Folk CSV
        working-directory: scraper
        run: python folk_export.py

      - name: Commit & push
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add docs/data/
          git diff --staged --quiet || git commit -m "Refresh directory $(date -u +%Y-%m-%d)"
          git push
